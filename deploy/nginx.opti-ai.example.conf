# 镜售 sale-system — Nginx 示例（请按实际域名 / 上游端口修改）
# 目标：
# 1) 静态资源与 Next 页面走站点根；PostgREST（/rest/v1）与 Next API（/api）走正确上游，避免 select= 误指到纯静态根导致 HTML 404。
# 2) proxy_intercept_errors off：上游错误时不由 Nginx 替换为自定义 HTML 错误页，便于客户端识别 JSON / 原始状态码。

# map $uri $opti_upstream_kind {
#   default "next";
#   ~*^/rest/v1 "postgrest";
# }

server {
  listen 443 ssl http2;
  server_name opti-ai.cn www.opti-ai.cn;

  # ssl_certificate ...;

  # 关闭拦截：不要把上游 4xx/5xx 换成 Nginx 的 html 整页（否则前端把 HTML 当 JSON 解析会乱码）
  proxy_intercept_errors off;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # —— PostgREST（Supabase-JS / cloudRest 的 select= 请求前缀，应对 NEXT_PUBLIC_ALIYUN_REST_URL）——
  location ^~ /rest/v1/ {
    proxy_pass http://127.0.0.1:3000; # 改为实际 PostgREST 监听地址，如 http://127.0.0.1:3001;
    # add_header Access-Control-Allow-Origin ...;  # 若跨域再按需配置
  }

  # —— Next.js App Router API（/api/*，须与 Node / PM2 端口一致）——
  location ^~ /api/ {
    proxy_pass http://127.0.0.1:3100; # 改为 Next server 端口
    proxy_read_timeout 120s;
  }

  # —— Next 页面与 _next 静态资源 —— #
  location /_next/ {
    proxy_pass http://127.0.0.1:3100;
    proxy_cache_bypass $http_upgrade;
  }

  location / {
    proxy_pass http://127.0.0.1:3100;
  }
}

# 若 PostgREST 与 Next 分域名部署，推荐：
# - 页面： https://opti-ai.cn  → Next
# - REST： https://api.opti-ai.cn  → PostgREST，仅在该域暴露 /rest/v1
# 前端 .env 中 NEXT_PUBLIC_ALIYUN_REST_URL=https://api.opti-ai.cn（无尾斜杠）
